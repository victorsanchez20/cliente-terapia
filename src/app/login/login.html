<div class="page-login">

    <div class="login-container">

        <!-- BODY -->
        <div class="login-body">
            <h2>Bienvenido de nuevo</h2>
            <p class="subtitle">Inicia sesión en tu cuenta para continuar</p>

            <form>

                <!-- DNI -->
                <div class="input-group">
                    <label for="dni">Documento de Identidad</label>
                    <input id="dni" type="text" placeholder="76452124" [(ngModel)]="dni" name="dni" />
                </div>

                <!-- PASSWORD -->
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <div class="password-box">
                        <input id="password" [type]="showPassword ? 'text' : 'password'" placeholder="••••••••"
                            [(ngModel)]="password" name="password" autocomplete="current-password" />
                        <button type="button" class="toggle-eye" aria-label="Toggle password visibility"
                            (click)="togglePassword()">
                            <i class="fa-regular" [class.fa-eye]="!showPassword"
                                [class.fa-eye-slash]="showPassword"></i>
                        </button>
                    </div>
                </div>

                <!-- ERROR -->
                @if (error) {
                  <p class="login-error">{{ error }}</p>
                }

                <!-- BUTTON -->
                <button type="button" class="login-btn" (click)="logear()">Iniciar sesión</button>
            </form>

        </div>
    </div>
</div>
